<!DOCTYPE html>
<html>
<head>
  <title>Redeem 30LP</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }


    img {
      display: none;
      max-width: 90%;
      max-height: 90vh;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <button id="redeemButton" onclick="redeem()">reedem 30lp</button>

  <img id="picture" src="ChatGPT Image May 19, 2026, 07_12_58 PM.png" alt="Redeem Image">

  <audio id="song" src="song.mp3" preload="auto"></audio>

  <script>
    function redeem() {
      const button = document.getElementById("redeemButton");
      const picture = document.getElementById("picture");
      const song = document.getElementById("song");

      button.style.display = "none";
      picture.style.display = "block";

      song.volume = 1;
      song.currentTime = 0;

      song.play().catch(function(error) {
        alert("Song could not play. Make sure song.mp3 is in the same folder as this HTML file.");
        console.log(error);
      });
    }
  </script>

</body>
</html>
